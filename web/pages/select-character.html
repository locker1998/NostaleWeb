<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <script src="/static/js/screen-transition-boot.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Character Selection</title>
  <link rel="stylesheet" href="/static/css/screen-transition.css" />
  <link rel="stylesheet" href="/static/css/bazaar.css" />
  <script src="/static/js/screen-transition.js"></script>
</head>
<body class="play">
  <div class="play-viewport">
  <div class="scene scene--login scene--character-select">
    <section class="login login--selection" role="dialog" aria-label="Character Selection">
      <h1 class="login__title">Character Selection</h1>
      <p class="login__hint">Choose a character to enter the world.</p>
      <p class="login__hint character-select__channel" id="character-channel-hint"></p>

      <div class="character-select__grid">
        <div class="character-select__slots selection-list" id="character-list" role="listbox" aria-label="Characters"></div>
        <div class="character-select__actions">
          <button type="button" class="bazaar__btn login__btn" id="character-select-server-btn">Select Server</button>
          <button type="button" class="bazaar__btn bazaar__btn--yellow login__btn" id="character-start-btn">START</button>
          <button type="button" class="bazaar__btn login__btn" id="character-delete-btn">Delete Character</button>
        </div>
      </div>
    </section>

    <div class="login-info-layer" id="login-info-layer" hidden>
      <div class="login-info" role="dialog" aria-labelledby="login-info-title">
        <h2 class="login-info__title" id="login-info-title">Info</h2>
        <p class="login-info__message" id="login-info-message"></p>
        <div class="login-info__actions">
          <button type="button" class="bazaar__btn login-info__btn" id="login-info-primary">Confirm</button>
          <button type="button" class="bazaar__btn login-info__btn" id="login-info-secondary" hidden>Cancel</button>
        </div>
      </div>
    </div>
  </div>
  </div>

  <script src="/static/js/ui-sound.js"></script>
  <script src="/static/js/session-flow.js"></script>
  <script src="/static/js/select-character.js"></script>
</body>
</html>
