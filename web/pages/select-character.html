<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <script src="/static/js/screen-transition-boot.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Character Selection</title>
  <link rel="stylesheet" href="/static/css/screen-transition.css" />
  <link rel="stylesheet" href="/static/css/play-critical.css" />
  <link rel="stylesheet" href="/static/css/bazaar.css" media="print" onload="this.media='all'" />
  <noscript><link rel="stylesheet" href="/static/css/bazaar.css" /></noscript>
  <script src="/static/js/screen-transition.js"></script>
</head>
<body class="play">
  <div class="play-viewport">
  <div class="scene scene--login scene--character-select">
    <div class="character-select__hero" id="character-select-hero" hidden aria-hidden="true">
      <div class="character-select__hero-stage character-view-stage" id="character-select-hero-stage"></div>
    </div>
    <div class="character-select" role="region" aria-label="Character Selection">
      <div class="character-select__slots-row">
        <button type="button" class="character-select__nav character-select__nav--prev bazaar__pager-arrow bazaar__pager-arrow--prev" id="character-slots-prev" aria-label="Previous character" hidden></button>
        <div class="character-select__slots-viewport">
          <div class="character-select__slots" id="character-list" role="listbox" aria-label="Characters"></div>
        </div>
        <button type="button" class="character-select__nav character-select__nav--next bazaar__pager-arrow bazaar__pager-arrow--next" id="character-slots-next" aria-label="Next character" hidden></button>
      </div>
      <div class="character-select__actions">
        <button type="button" class="character-select__action-btn character-select__action-btn--server" id="character-select-server-btn" aria-label="Select Server">Select Server</button>
        <button type="button" class="character-select__action-btn character-select__action-btn--start" id="character-start-btn" aria-label="Start">START</button>
        <button type="button" class="character-select__action-btn character-select__action-btn--delete" id="character-delete-btn" aria-label="Delete Character">Delete Character</button>
      </div>
    </div>

    <div class="login-info-layer" id="login-info-layer" hidden>
      <div class="login-info" role="dialog" aria-labelledby="login-info-title">
        <h2 class="login-info__title" id="login-info-title">Info</h2>
        <p class="login-info__message" id="login-info-message"></p>
        <div class="login-info__actions">
          <button type="button" class="bazaar__btn login-info__btn" id="login-info-primary">Confirm</button>
          <button type="button" class="bazaar__btn login-info__btn" id="login-info-secondary" hidden>Cancel</button>
        </div>
      </div>
    </div>
  </div>
  </div>

  <script src="/static/js/ui-sound.js"></script>
  <script src="/static/js/character-view.js"></script>
  <script src="/static/js/session-flow.js"></script>
  <script src="/static/js/select-character.js"></script>
</body>
</html>
